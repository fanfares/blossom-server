host: 0.0.0.0
port: 3000

# Leave empty for workers.dev, set to custom domain when attached.
publicDomain: "${BLOSSOM_PUBLIC_DOMAIN}"

# Temporary fallback DB for Cloudflare deployment.
# Replace with Turso `database.url` + `authToken` once secrets are configured.
database:
  path: ./data/sqlite.db

storage:
  backend: r2
  r2:
    accountId: "${CF_ACCOUNT_ID}"
    bucket: "${R2_BUCKET}"
    accessKey: "${R2_ACCESS_KEY_ID}"
    secretKey: "${R2_SECRET_ACCESS_KEY}"
    tmpDir: /tmp/blossom-r2-tmp

upload:
  enabled: true
  requireAuth: false

mirror:
  enabled: true
  requireAuth: false

delete:
  requireAuth: false

list:
  enabled: true
  requireAuth: false

media:
  enabled: false

landing:
  enabled: true
  title: "Fanfares Blossom Server"

report:
  enabled: false

dashboard:
  enabled: false
