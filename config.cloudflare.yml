host: 0.0.0.0
port: 3000

# Canonical deployment hostname used for blob URLs and BUD-11 server-tag validation.
publicDomain: "blossom.fanfares.live"

# Temporary metadata backend for container runtime.
# D1 is provisioned in wrangler.jsonc, but this Deno process cannot use Worker
# bindings directly until a runtime integration refactor is completed.
database:
  path: ./data/sqlite.db

storage:
  backend: r2
  r2:
    accountId: "${CF_ACCOUNT_ID}"
    bucket: "${R2_BUCKET}"
    accessKey: "${R2_ACCESS_KEY_ID}"
    secretKey: "${R2_SECRET_ACCESS_KEY}"
    tmpDir: /tmp/blossom-r2-tmp

upload:
  enabled: true
  requireAuth: true

mirror:
  enabled: false
  requireAuth: true

delete:
  requireAuth: true

list:
  enabled: true
  requireAuth: false

media:
  enabled: false

landing:
  enabled: true
  title: "Fanfares Blossom Server"

report:
  enabled: false

dashboard:
  enabled: false
